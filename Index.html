<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .student-row { 
      padding: 12px 0; 
      border-bottom: 1px solid #e9ecef; 
      background-color: #ffffff;
    }
    .student-name { font-size: 1.1rem; }
    /* ปรับขนาดตัวหนังสือในปุ่มให้พอดีเมื่อมี 3 ปุ่ม */
    .btn-group .btn { padding: 8px 4px; font-size: 0.9rem; }
  </style>
</head>
<body class="container py-4">
  <div class="card shadow-sm">
    <div class="card-body">
      <h3 class="text-center text-primary mb-2">ระบบเช็คชื่อนักเรียน</h3>
      <div class="text-center mb-4 text-muted fw-bold" id="currentDateTime"></div>

      <div id="loading" class="text-center py-4">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="mt-2">กำลังโหลดรายชื่อ...</div>
      </div>

      <form id="attendanceForm" style="display:none;">
        <div id="studentList" class="mb-4"></div>
        
        <div class="text-center mt-4 position-sticky bottom-0 bg-white py-3" style="border-top: 2px dashed #eee;">
          <button type="button" class="btn btn-primary btn-lg w-100 rounded-pill shadow" onclick="submitData()" id="submitBtn">
            💾 บันทึกข้อมูล
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ฟังก์ชันแสดงวันและเวลาปัจจุบัน
    function updateTime() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit', second:'2-digit' };
      document.getElementById('currentDateTime').innerText = now.toLocaleDateString('th-TH', options);
    }
    setInterval(updateTime, 1000);
    updateTime();

    // โหลดรายชื่อจาก Google Sheets
    google.script.run.withSuccessHandler(function(names) {
      document.getElementById('loading').style.display = 'none';
      const form = document.getElementById('attendanceForm');
      const list = document.getElementById('studentList');
      form.style.display = 'block';

      names.forEach((name, index) => {
        list.innerHTML += `
          <div class="row align-items-center student-row px-2">
            <div class="col-12 col-md-5 student-name fw-semibold mb-2 mb-md-0">${name}</div>
            <div class="col-12 col-md-7">
              <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="status_${index}" id="present_${index}" value="/" checked>
                <label class="btn btn-outline-success" for="present_${index}">มาเรียน</label>

                <input type="radio" class="btn-check" name="status_${index}" id="leave_${index}" value="ล">
                <label class="btn btn-outline-warning" for="leave_${index}">ลา</label>

                <input type="radio" class="btn-check" name="status_${index}" id="moved_${index}" value="">
                <label class="btn btn-outline-secondary" for="moved_${index}">ย้ายออก</label>
              </div>
              <input type="hidden" name="student_name" value="${name}">
            </div>
          </div>
        `;
      });
    }).getStudentNames();

    // ฟังก์ชันรวบรวมข้อมูลและส่งไปบันทึก
    function submitData() {
      const names = document.querySelectorAll('input[name="student_name"]');
      let data = [];

      names.forEach((nameInput, index) => {
        let status = document.querySelector(`input[name="status_${index}"]:checked`).value;
        data.push({ name: nameInput.value, status: status });
      });

      // ปิดปุ่มกันกดซ้ำระหว่างบันทึก
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> กำลังบันทึก...';

      // ส่งข้อมูลไปที่ไฟล์ Code.gs
      google.script.run.withSuccessHandler(function(res) {
        alert(res);
        btn.disabled = false;
        btn.innerHTML = '💾 บันทึกข้อมูล';
        // เมื่อบันทึกเสร็จ อาจจะรีเฟรชหน้าเว็บหรือล้างค่าตามต้องการ
      }).saveAttendance(data);
    }
  </script>
</body>
</html>
